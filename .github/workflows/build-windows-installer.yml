name: Build Windows Installer

on:
  workflow_dispatch: {}
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # pip install / PyInstaller より前に実行して、コミットSHA・ビルド日時を
      # svtracker/_build_info.py としてパッケージに焼き込む(バージョン表示用)。
      - name: Embed build info for version display
        run: python packaging/write_build_info.py

      - name: Install project + build tools
        run: |
          python -m pip install --upgrade pip
          pip install ".[windows,ocr]"
          pip install pyinstaller

      # cv2はコードで未使用のため同梱しない。scipyはimagehashのpHashが使う
      # scipy.fftpackだけあればよく、--collect-all(テスト等も全同梱)はサイズ肥大の
      # 元なのでhidden-import指定に留める。
      - name: Build CLI exe with PyInstaller
        run: pyinstaller --name svtracker --onefile --console --hidden-import scipy.fftpack --collect-all imagehash --collect-all mss --collect-submodules PIL packaging/entrypoint.py

      - name: Smoke test the CLI exe
        run: |
          .\dist\svtracker.exe --help
          .\dist\svtracker.exe --version

      # 同梱を絞った結果モジュール欠落(特にscipy.fftpack)が起きていないか、
      # 実際にpHash計算を通して確認する(import-cardsは画像を開いてpHashを計算する)。
      - name: Smoke test pHash pipeline via import-cards
        shell: pwsh
        run: |
          python -c "from PIL import Image; Image.new('RGB', (64, 64), (200, 30, 30)).save('smoke_card.png')"
          Set-Content -Path smoke_cards.csv -Value "card_id,name,clan,cost,card_type,rarity,filename`n1,SmokeCard,ニュートラル,1,フォロワー,ブロンズ,smoke_card.png" -Encoding utf8
          .\dist\svtracker.exe import-cards . smoke_cards.csv
          if ($LASTEXITCODE -ne 0) { Write-Error "import-cards smoke test failed"; exit 1 }
          Write-Host "pHash pipeline OK"

      - name: Build GUI exe with PyInstaller
        run: pyinstaller --name svtracker-gui --onefile --windowed --hidden-import scipy.fftpack --collect-all imagehash --collect-all mss --collect-submodules PIL --collect-submodules tkinter packaging/gui_entrypoint.py

      - name: Smoke test the GUI exe (launch, confirm it stays running, then close)
        shell: pwsh
        run: |
          $proc = Start-Process -FilePath ".\dist\svtracker-gui.exe" -PassThru
          Start-Sleep -Seconds 6
          if ($proc.HasExited) {
            Write-Error "svtracker-gui.exe exited early (exit code $($proc.ExitCode))"
            exit 1
          }
          Stop-Process -Id $proc.Id -Force
          Write-Host "svtracker-gui.exe launched and stayed running - OK"

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build installer with Inno Setup
        run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" packaging\installer.iss'

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: svtracker-windows-installer
          path: dist_installer/svtracker-setup.exe

      - name: Upload standalone exe artifacts
        uses: actions/upload-artifact@v4
        with:
          name: svtracker-exe
          path: |
            dist/svtracker.exe
            dist/svtracker-gui.exe
