name: Build Windows Installer

on:
  workflow_dispatch: {}
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project + build tools
        run: |
          python -m pip install --upgrade pip
          pip install ".[windows,ocr]"
          pip install pyinstaller

      - name: Build standalone exe with PyInstaller
        run: pyinstaller --name svtracker --onefile --console --collect-all cv2 --collect-all scipy --collect-all imagehash --collect-all mss --collect-submodules PIL packaging/entrypoint.py

      - name: Smoke test the built exe
        run: .\dist\svtracker.exe --help

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build installer with Inno Setup
        run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" packaging\installer.iss'

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: svtracker-windows-installer
          path: dist_installer/svtracker-setup.exe

      - name: Upload standalone exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: svtracker-exe
          path: dist/svtracker.exe
