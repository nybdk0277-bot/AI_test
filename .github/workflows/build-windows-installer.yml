name: Build Windows Installer

on:
  workflow_dispatch: {}
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # pip install / PyInstaller より前に実行して、コミットSHA・ビルド日時を
      # svtracker/_build_info.py としてパッケージに焼き込む(バージョン表示用)。
      - name: Embed build info for version display
        run: python packaging/write_build_info.py

      - name: Install project + build tools
        run: |
          python -m pip install --upgrade pip
          pip install ".[windows,ocr]"
          pip install pyinstaller

      - name: Build CLI exe with PyInstaller
        run: pyinstaller --name svtracker --onefile --console --collect-all cv2 --collect-all scipy --collect-all imagehash --collect-all mss --collect-submodules PIL packaging/entrypoint.py

      - name: Smoke test the CLI exe
        run: .\dist\svtracker.exe --help

      - name: Build GUI exe with PyInstaller
        run: pyinstaller --name svtracker-gui --onefile --windowed --collect-all cv2 --collect-all scipy --collect-all imagehash --collect-all mss --collect-submodules PIL --collect-submodules tkinter packaging/gui_entrypoint.py

      - name: Smoke test the GUI exe (launch, confirm it stays running, then close)
        shell: pwsh
        run: |
          $proc = Start-Process -FilePath ".\dist\svtracker-gui.exe" -PassThru
          Start-Sleep -Seconds 6
          if ($proc.HasExited) {
            Write-Error "svtracker-gui.exe exited early (exit code $($proc.ExitCode))"
            exit 1
          }
          Stop-Process -Id $proc.Id -Force
          Write-Host "svtracker-gui.exe launched and stayed running - OK"

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build installer with Inno Setup
        run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" packaging\installer.iss'

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: svtracker-windows-installer
          path: dist_installer/svtracker-setup.exe

      - name: Upload standalone exe artifacts
        uses: actions/upload-artifact@v4
        with:
          name: svtracker-exe
          path: |
            dist/svtracker.exe
            dist/svtracker-gui.exe
